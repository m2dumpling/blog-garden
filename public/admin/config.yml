# Decap CMS — 本地编辑工具
# 线上只展示，不登录；CMS 编辑器在本地用
#
# 本地使用：
#   1. pnpm dev
#   2. npx decap-server
#   3. 打开 http://localhost:3000/admin/
#   4. 编辑 → 保存 → git push → 上线

local_backend: true

backend:
  name: git-gateway
  repo: m2dumpling/digital-garden
  branch: main

media_folder: public/images
public_folder: /images

locale: zh_Hans

collections:
  - name: blog
    label: 📝 博客
    label_singular: 文章
    folder: content/blog
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    editor:
      preview: false
    fields:
      - { name: title, label: 标题, widget: string }
      - { name: description, label: 简介, widget: text }
      - { name: author, label: 作者, widget: string, default: Dumpling }
      - { name: date, label: 日期, widget: date, format: YYYY-MM-DD }
      - { name: tags, label: 标签, widget: list, default: [] }
      - { name: body, label: 正文, widget: markdown }

  - name: projects
    label: 🔧 项目
    label_singular: 项目
    folder: content/projects
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    editor:
      preview: false
    fields:
      - { name: title, label: 项目名称, widget: string }
      - { name: description, label: 简介, widget: text }
      - { name: tech, label: 技术栈, widget: list, default: [] }
      - { name: status, label: 状态, widget: select, options: [{ label: "进行中", value: "active" }, { label: "已完成", value: "completed" }, { label: "已归档", value: "archived" }], default: active }
      - { name: body, label: 正文, widget: markdown }

  - name: docs
    label: 📚 知识库
    label_singular: 文档
    folder: content/docs
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    editor:
      preview: false
    fields:
      - { name: title, label: 标题, widget: string }
      - { name: description, label: 简介, widget: text }
      - { name: body, label: 正文, widget: markdown }
