# Decap CMS — 内容管理后台
# 部署即用，无需额外配置。如需使用 CMS 编辑内容，配置 GitHub OAuth 即可登录。
#
# GitHub OAuth 配置（5 分钟）：
#   1. https://github.com/settings/developers → New OAuth App
#   2. Homepage URL:  https://你的域名
#   3. Callback URL:   https://你的域名/admin/
#   4. 把 Client ID 填到下方 client_id 字段
#
# 本地开发（不想配 OAuth）：
#   在上方加一行 `local_backend: true`，然后执行 npx decap-server，
#   打开 /admin 即可免登录编辑。测试完记得删掉这行。

backend:
  name: github
  repo: m2dumpling/digital-garden
  branch: main
  # client_id: 你的 GitHub OAuth Client ID

media_folder: public/images
public_folder: /images

site_url: https://digital-garden.vercel.app
display_url: https://digital-garden.vercel.app
locale: zh_Hans

# ============================================================
# 内容集合
# ============================================================
collections:
  - name: blog
    label: 📝 博客
    label_singular: 文章
    folder: content/blog
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    editor:
      preview: false
    fields:
      - { name: title, label: 标题, widget: string }
      - { name: description, label: 简介, widget: text }
      - { name: author, label: 作者, widget: string, default: Dumpling }
      - { name: date, label: 日期, widget: date, format: YYYY-MM-DD }
      - { name: tags, label: 标签, widget: list, default: [] }
      - { name: body, label: 正文, widget: markdown }

  - name: projects
    label: 🔧 项目
    label_singular: 项目
    folder: content/projects
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    editor:
      preview: false
    fields:
      - { name: title, label: 项目名称, widget: string }
      - { name: description, label: 简介, widget: text }
      - { name: tech, label: 技术栈, widget: list, default: [] }
      - { name: status, label: 状态, widget: select, options: [{ label: "进行中", value: "active" }, { label: "已完成", value: "completed" }, { label: "已归档", value: "archived" }], default: active }
      - { name: body, label: 正文, widget: markdown }

  - name: docs
    label: 📚 知识库
    label_singular: 文档
    folder: content/docs
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    editor:
      preview: false
    fields:
      - { name: title, label: 标题, widget: string }
      - { name: description, label: 简介, widget: text }
      - { name: body, label: 正文, widget: markdown }
